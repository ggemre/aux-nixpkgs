name: "Benchmark images"
on:
  pull_request:
    types: [ opened ]

jobs:
  build-x86:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [sd-image]

    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v3

      - name: Install nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build image
        run: |
          nix build \
            .#images.${{ matrix.image }}.config.system.build.sdImage \
            --out-link ${{ matrix.image }}

  build-arm:
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        image: [sd-image]

    steps:
      - uses: actions/checkout@v6

      - name: Install nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build image
        run: |
          nix build \
            .#images.${{ matrix.image }}.config.system.build.sdImage \
            --out-link ${{ matrix.image }}

