name: "Build and deploy"
on:
  push:
    branches: [main]
    paths:
      - 'pkgs/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Get changes to pkgs
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            pkgs:
              - added|modified: 'pkgs/*/*.nix'

      - name: Install nix
        uses: cachix/install-nix-action@v31
        if: ${{ steps.filter.outputs.pkgs == 'true' }}
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build packages
        if: ${{ steps.filter.outputs.pkgs == 'true' }}
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          nix run nixpkgs#nix-fast-build -- \
              --no-nom --skip-cached --cachix-cache ggemre
