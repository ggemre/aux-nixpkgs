name: "Release images"
on:
  push:
    branches: [main]
    paths:
      - 'images/**/*.nix'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - cd-minimal

    steps:
      - uses: actions/checkout@v6

      - name: Install nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build image
        run: |
          nix build \
            .#images.${{ matrix.image }}.config.system.build.isoImage \
            --out-link ${{ matrix.image }}

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.image }}-img
          path: ${{ matrix.image }}/iso/*.iso

  release:
    runs-on: ubuntu-latest
    needs: build

    steps: 
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: build
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.release_tag }}
          name: Images Build ${{ needs.build.outputs.release_tag }}
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    

