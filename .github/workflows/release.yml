name: "Release images"
on:
  push:
    branches: [ main ]
    paths:
      - 'images/**/*.nix'

jobs:
  build-x86:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [ cd-installer ]

    steps:
      - uses: actions/checkout@v6

      - name: Install nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build image
        run: |
          nix build \
            .#images.${{ matrix.image }}.config.system.build.isoImage \
            --out-link ${{ matrix.image }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: images
          path: ${{ matrix.image }}/iso/*.zst

  build-arm:
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        image: [ sd-image ]

    steps:
      - uses: actions/checkout@v6

      - name: Install nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build image
        run: |
          nix build \
            .#images.${{ matrix.image }}.config.system.build.sdImage \
            --out-link ${{ matrix.image }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: images
          path: ${{ matrix.image }}/*.zst


  release:
    runs-on: ubuntu-latest
    needs: [ build-x86, build-arm ]

    steps: 
      - uses: actions/checkout@v6

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: images
          path: dist/

      - name: Get date
        id: date
        run: |
          echo "date=$(date +'%Y-%m-%d')" >> "${GITHUB_OUTPUT}"
          echo "date_time=$(date +'%Y-%m-%d-%s')" >> "${GITHUB_OUTPUT}"

      - name: Create tag
        run: |
          git tag "v${{ steps.date.outputs.date_time }}"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git "v${{ steps.date.outputs.date_time }}"

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "v${{ steps.date.outputs.date_time }}"
          name: Images ${{ steps.date.outputs.date }}
          files: dist/*.zst
          body: |
            # Image release

            Created on ${{ steps.date.outputs.date_time }}.

            The available images serve my purposes as follows:

            - **cd-installer**: basic x86_64-linux iso for installing NixOS
            - **sd-image**: basic aarch64-linux iso for running NixOS

            Use `zstd -d <file_name.zst>` to decompress the artifact.
            You can use `dd` to flash the image, e.g.:

            ```sh
              sudo dd if=<path/to/image> of=<path/to/device> status=progress bs=4M conv=fsync
            ```

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    

