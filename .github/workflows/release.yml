name: "Release images"
on:
  push:
    branches: [main]
    paths:
      - 'images/**/*.nix'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - cd-minimal

    steps:
      - uses: actions/checkout@v6

      - name: Install nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build image
        run: |
          nix build \
            .#images.${{ matrix.image }}.config.system.build.isoImage \
            --out-link ${{ matrix.image }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: images
          path: ${{ matrix.image }}/iso/*.iso

  release:
    runs-on: ubuntu-latest
    needs: build

    steps: 
      - uses: actions/checkout@v6

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: images
          path: dist/

      - name: Get date
        id: date
        run: |
          echo "date=$(date +'%Y-%m-%d')" >> "${GITHUB_OUTPUT}"
          echo "date_time=$(date +'%Y-%m-%d-%s')" >> "${GITHUB_OUTPUT}"

      - name: Create tag
        run: |
          git tag "v${{ steps.date.outputs.date_time }}"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git "v${{ steps.date.outputs.date_time }}"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.date.outputs.date_time }}"
          name: Images ${{ steps.date.outputs.date }}
          files: |
            dist/*.iso
            dist/*.img
          body: |
            # Image release

            Created on ${{ steps.date.outputs.date_time }}.

            - **cd-minimal**: basic x86_64-linux iso for installing NixOS

            `${{ needs.build.outputs.release_tag }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    

